<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memorama Colgate-Palmolive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

header {
  background: #8B1E1E;
  color: white;
  padding: 16px;
  font-size: 24px;
  font-weight: bold;
}

.controls {
  margin: 12px 0;
}

button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 12px 18px;
  margin: 6px;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
}

.stats {
  font-size: 18px;
  margin-bottom: 10px;
}

.game {
  display: grid;
  gap: 12px;
  max-width: 420px;
  margin: 0 auto 40px;
  padding: 0 12px;
}

.card {
  aspect-ratio: 3 / 4;
  background: #d32f2f;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.card img {
  width: 90%;
  height: 90%;
  object-fit: contain;
  display: none;
}

.card.flipped {
  background: white;
}

.card.flipped img {
  display: block;
}
</style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<div class="controls">
  <button id="soundBtn">🔊 Activar sonido</button>
</div>

<div class="controls">
  <button onclick="startGame(2)">Fácil 2x2</button>
  <button onclick="startGame(3)">Medio 2x3</button>
  <button onclick="startGame(4)">Difícil 4x4</button>
</div>

<div class="stats">
  Intentos: <span id="moves">0</span>
</div>

<div class="game" id="gameBoard"></div>

<!-- AUDIOS -->
<audio id="bgMusic" src="audio/ambient.mp3" loop></audio>
<audio id="flipSound" src="audio/flip.mp3"></audio>
<audio id="matchSound" src="audio/match.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<script>
const allImages = [
  'img/accion.png',
  'img/colgate.png',
  'img/palmolive.png',
  'img/softsoap.png'
];

let cards = [];
let flipped = [];
let moves = 0;
let totalCards = 0;
let soundEnabled = false;
let gameStarted = false;
let confettiActive = false;

const board = document.getElementById('gameBoard');
const movesEl = document.getElementById('moves');

const bgMusic = document.getElementById('bgMusic');
const flipSound = document.getElementById('flipSound');
const matchSound = document.getElementById('matchSound');
const winSound = document.getElementById('winSound');
const soundBtn = document.getElementById('soundBtn');

soundBtn.onclick = () => {
  soundEnabled = !soundEnabled;
  if (soundEnabled) {
    bgMusic.volume = 0.4;
    bgMusic.play();
    soundBtn.textContent = '🔇 Silenciar sonido';
  } else {
    bgMusic.pause();
    soundBtn.textContent = '🔊 Activar sonido';
  }
};

function startGame(pairs) {
  gameStarted = true;
  board.innerHTML = '';
  moves = 0;
  movesEl.textContent = moves;
  flipped = [];
  confettiActive = false;

  let selected = allImages.slice(0, pairs);
  cards = [...selected, ...selected].sort(() => Math.random() - 0.5);
  totalCards = cards.length;

  let cols = pairs === 2 ? 2 : pairs === 3 ? 3 : 4;
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  cards.forEach(img => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.image = img;

    const image = document.createElement('img');
    image.src = img;

    card.appendChild(image);
    card.onclick = () => flipCard(card);
    board.appendChild(card);
  });
}

function flipCard(card) {
  if (!gameStarted) return;
  if (card.classList.contains('flipped')) return;
  if (flipped.length === 2) return;

  card.classList.add('flipped');
  if (soundEnabled) flipSound.play();

  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;

    if (flipped[0].dataset.image === flipped[1].dataset.image) {
      if (soundEnabled) matchSound.play();
      flipped = [];

      if (document.querySelectorAll('.card.flipped').length === totalCards) {
        winGame();
      }
    } else {
      setTimeout(() => {
        flipped.forEach(c => c.classList.remove('flipped'));
        flipped = [];
      }, 800);
    }
  }
}

function winGame() {
  if (confettiActive) return;
  confettiActive = true;

  if (soundEnabled) winSound.play();

  const duration = 2000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 6,
      spread: 70,
      colors: ['#ffffff', '#d32f2f'],
      origin: { y: 0.6 }
    });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}
</script>

</body>
</html>
