<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Memorama Colgate-Palmolive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #f2f2f2;
      text-align: center;
    }

    header {
      background: #8b1d18;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    #menu {
      margin: 20px 0;
    }

    .btn {
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #b71c1c;
    }

    #attempts {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #game {
      display: grid;
      gap: 15px;
      justify-content: center;
      padding-bottom: 40px;
    }

    .card {
      width: 110px;
      height: 140px;
      background: #d32f2f;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      padding: 10px;
      background: white;
      border-radius: 14px;
    }

    .card.flipped img {
      display: block;
    }

    /* MODAL */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #modal-content {
      background: white;
      padding: 30px;
      border-radius: 18px;
      width: 300px;
    }

    #modal-content h2 {
      color: #d32f2f;
      margin-top: 0;
    }

    @media (max-width: 600px) {
      .card {
        width: 90px;
        height: 120px;
      }
    }
  </style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<div id="menu">
  <button class="btn" onclick="startGame(6)">Fácil</button>
  <button class="btn" onclick="startGame(12)">Medio</button>
  <button class="btn" onclick="startGame(16)">Difícil</button>
</div>

<div id="attempts">Intentos: 0</div>

<div id="game"></div>

<div id="modal">
  <div id="modal-content">
    <h2>¡Felicidades!</h2>
    <p id="finalText"></p>
    <button class="btn" onclick="resetGame()">Jugar otra vez</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  const images = [
    "img/img1.png",
    "img/img2.png",
    "img/img3.png",
    "img/img4.png",
    "img/img5.png",
    "img/img6.png",
    "img/img7.png",
    "img/img8.png"
  ];

  let firstCard = null;
  let secondCard = null;
  let lock = false;
  let attempts = 0;
  let matches = 0;
  let totalPairs = 0;
  let confettiInterval = null;

  function startGame(cardCount) {
    stopConfetti();
    document.getElementById("modal").style.display = "none";
    document.getElementById("game").innerHTML = "";
    attempts = 0;
    matches = 0;
    firstCard = null;
    secondCard = null;
    lock = false;

    document.getElementById("attempts").textContent = "Intentos: 0";

    totalPairs = cardCount / 2;
    const selected = images.slice(0, totalPairs);
    const cards = [...selected, ...selected].sort(() => Math.random() - 0.5);

    let columns = 4;
    if (cardCount === 6) columns = 3;
    if (cardCount === 12) columns = 4;
    if (cardCount === 16) columns = 4;

    const game = document.getElementById("game");
    game.style.gridTemplateColumns = `repeat(${columns}, 110px)`;

    cards.forEach(src => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.image = src;

      const img = document.createElement("img");
      img.src = src;

      card.appendChild(img);
      card.addEventListener("click", () => flipCard(card));
      game.appendChild(card);
    });
  }

  function flipCard(card) {
    if (lock || card.classList.contains("flipped")) return;

    card.classList.add("flipped");

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    lock = true;
    attempts++;
    document.getElementById("attempts").textContent = "Intentos: " + attempts;

    if (firstCard.dataset.image === secondCard.dataset.image) {
      matches++;
      resetSelection();
      if (matches === totalPairs) winGame();
    } else {
      setTimeout(() => {
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        resetSelection();
      }, 900);
    }
  }

  function resetSelection() {
    firstCard = null;
    secondCard = null;
    lock = false;
  }

  function winGame() {
    document.getElementById("finalText").textContent =
      `Lo lograste en ${attempts} intentos`;
    document.getElementById("modal").style.display = "flex";
    startConfetti();
  }

  function resetGame() {
    stopConfetti();
    document.getElementById("modal").style.display = "none";
    document.getElementById("game").innerHTML = "";
    document.getElementById("attempts").textContent = "Intentos: 0";
  }

  function startConfetti() {
    confettiInterval = setInterval(() => {
      confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 }
      });
    }, 700);
  }

  function stopConfetti() {
    if (confettiInterval) {
      clearInterval(confettiInterval);
      confettiInterval = null;
    }
  }
</script>

</body>
</html>
