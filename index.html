<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Memorama Colgate-Palmolive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
    }

    header {
      background: #8b0000;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .controls {
      margin: 20px 0;
    }

    .controls button {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 12px 24px;
      margin: 5px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .controls button:hover {
      background: #b71c1c;
    }

    #attempts {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .game {
      display: grid;
      justify-content: center;
      gap: 15px;
      padding-bottom: 40px;
    }

    .card {
      width: 120px;
      height: 160px;
      background: #d32f2f;
      border-radius: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: white;
      border-radius: 16px;
    }

    .card.flipped img {
      display: block;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 300px;
    }

    .modal-content h2 {
      color: #d32f2f;
    }

    .modal-content button {
      margin-top: 20px;
      background: #d32f2f;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<div class="controls">
  <button onclick="startGame(4)">Fácil</button>
  <button onclick="startGame(6)">Medio</button>
  <button onclick="startGame(8)">Difícil</button>
</div>

<div id="attempts">Intentos: 0</div>

<div id="game" class="game"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>¡Felicidades!</h2>
    <p id="finalText"></p>
    <button onclick="resetGame()">Jugar otra vez</button>
  </div>
</div>

<script>
  // ====== SONIDOS ======
  let audioEnabled = false;

  const flipSound = new Audio("error.wav");
  const matchSound = new Audio("feria.wav");
  const winSound = new Audio("feria.wav");
  const ambientSound = new Audio("feria.wav");

  ambientSound.loop = true;
  ambientSound.volume = 0.25;
  flipSound.volume = 0.6;
  matchSound.volume = 0.7;
  winSound.volume = 0.9;

  function enableAudio() {
    if (!audioEnabled) {
      audioEnabled = true;
      ambientSound.play().catch(() => {});
    }
  }

  function stopAmbient() {
    ambientSound.pause();
    ambientSound.currentTime = 0;
  }

  // ====== JUEGO ======
  const images = [
    "img/img1.png","img/img2.png","img/img3.png","img/img4.png",
    "img/img5.png","img/img6.png","img/img7.png","img/img8.png"
  ];

  let firstCard = null;
  let secondCard = null;
  let lock = false;
  let attempts = 0;
  let matches = 0;
  let totalPairs = 0;

  function startGame(pairCount) {
    enableAudio();
    stopAmbient();
    ambientSound.play().catch(()=>{});

    document.getElementById("modal").style.display = "none";
    document.getElementById("game").innerHTML = "";
    attempts = 0;
    matches = 0;
    firstCard = null;
    secondCard = null;
    lock = false;
    totalPairs = pairCount;

    document.getElementById("attempts").textContent = "Intentos: 0";

    let selected = images.slice(0, pairCount);
    let cards = [...selected, ...selected].sort(() => 0.5 - Math.random());

    const game = document.getElementById("game");

    if (pairCount === 4) game.style.gridTemplateColumns = "repeat(2, 120px)";
    if (pairCount === 6) game.style.gridTemplateColumns = "repeat(3, 120px)";
    if (pairCount === 8) game.style.gridTemplateColumns = "repeat(4, 120px)";

    cards.forEach(src => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.image = src;

      const img = document.createElement("img");
      img.src = src;

      card.appendChild(img);
      card.addEventListener("click", () => flipCard(card));
      game.appendChild(card);
    });
  }

  function flipCard(card) {
    if (lock || card.classList.contains("flipped")) return;

    flipSound.currentTime = 0;
    flipSound.play();

    card.classList.add("flipped");

    if (!firstCard) {
      firstCard = card;
    } else {
      secondCard = card;
      attempts++;
      document.getElementById("attempts").textContent = "Intentos: " + attempts;
      checkMatch();
    }
  }

  function checkMatch() {
    lock = true;

    if (firstCard.dataset.image === secondCard.dataset.image) {
      matchSound.currentTime = 0;
      matchSound.play();

      matches++;
      resetSelection();

      if (matches === totalPairs) {
        setTimeout(winGame, 600);
      }
    } else {
      setTimeout(() => {
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        resetSelection();
      }, 800);
    }
  }

  function resetSelection() {
    firstCard = null;
    secondCard = null;
    lock = false;
  }

  function winGame() {
    stopAmbient();
    winSound.currentTime = 0;
    winSound.play();

    document.getElementById("finalText").textContent =
      `Lo lograste en ${attempts} intentos`;

    document.getElementById("modal").style.display = "flex";
  }

  function resetGame() {
    stopAmbient();
    document.getElementById("modal").style.display = "none";
    document.getElementById("game").innerHTML = "";
    document.getElementById("attempts").textContent = "Intentos: 0";
  }
</script>

</body>
</html>
