<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorama Colgate-Palmolive</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:0;
}
.controls{
  margin:15px;
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap:wrap;
}
.game{
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:10px;
}
@media(min-width:600px){
  .game{grid-template-columns:repeat(4,120px);}
}
.card{
  width:100%;
  aspect-ratio:1;
  background:#d32f2f;
  cursor:pointer;
  perspective:800px;
  border-radius:10px;
}
.inner{
  width:100%;
  height:100%;
  transition:0.6s;
  transform-style:preserve-3d;
  position:relative;
}
.flipped .inner{transform:rotateY(180deg);}
.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
}
.front{background:#d32f2f;}
.back{
  background:#fff;
  transform:rotateY(180deg);
  display:flex;
  align-items:center;
  justify-content:center;
}
.back img{
  max-width:100%;
  max-height:100%;
}
</style>
</head>

<body>

<h2>Memorama Colgate-Palmolive</h2>

<div class="controls">
  <button onclick="playAmb()">🔊 Sonido</button>
  <div>Intentos: <b id="att">0</b></div>
  <button onclick="reset()">🔄 Reiniciar</button>
</div>

<div class="game" id="game"></div>

<!-- Audios -->
<audio id="amb" loop src="feria.wav"></audio>
<audio id="ok" src="error.wav"></audio>
<audio id="fail" src="error.wav"></audio>

<script>
const images = [
  "img1.png",
  "img3.png",
  "img4.png",
  "img5.png",
  "img6.png",
  "img7.png",
  "img8.png"
];

const game = document.getElementById("game");
const att = document.getElementById("att");
const ok = document.getElementById("ok");
const fail = document.getElementById("fail");

let first = null;
let lock = false;
let attempts = 0;

function setup(){
  game.innerHTML="";
  attempts=0;
  att.textContent=0;
  let cards=[...images,...images].sort(()=>Math.random()-0.5);

  cards.forEach(src=>{
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <div class="inner">
        <div class="front"></div>
        <div class="back">
          <img src="${src}">
        </div>
      </div>`;
    c.onclick=()=>flip(c);
    game.appendChild(c);
  });
}

function flip(card){
  if(lock||card.classList.contains("flipped")) return;
  card.classList.add("flipped");

  if(!first){
    first=card;
    return;
  }

  lock=true;
  attempts++;
  att.textContent=attempts;

  const a=first.querySelector("img").src;
  const b=card.querySelector("img").src;

  if(a===b){
    ok.currentTime=0;
    ok.play();
    first=null;
    lock=false;
  }else{
    fail.currentTime=0;
    fail.play();
    setTimeout(()=>{
      first.classList.remove("flipped");
      card.classList.remove("flipped");
      first=null;
      lock=false;
    },900);
  }
}

function reset(){setup();}
function playAmb(){document.getElementById("amb").play();}

setup();
</script>

</body>
</html>
