<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Memorama Colgate-Palmolive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: #f2f2f2;
  min-height: 100vh;
}

/* ===== MENÚ ===== */
#menu {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#menu h1 {
  font-size: 3rem;
  margin-bottom: 30px;
}

.difficulty button {
  padding: 15px 30px;
  font-size: 1.2rem;
  margin: 10px;
  cursor: pointer;
}

#startBtn {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: 1.4rem;
  cursor: pointer;
}

/* ===== JUEGO ===== */
#game {
  display: none;
  padding: 20px;
  text-align: center;
}

header {
  margin-bottom: 20px;
}

header h1 {
  margin: 10px 0;
  font-size: 2.5rem;
}

.controls {
  margin-bottom: 15px;
}

.controls button {
  padding: 8px 15px;
  margin: 0 5px;
  font-size: 1rem;
  cursor: pointer;
}

#board {
  display: grid;
  gap: 15px;
  justify-content: center;
}

/* ===== CARTAS ===== */
.card {
  background: #ffffff;
  border-radius: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s;
}

.card img {
  max-width: 80%;
  max-height: 80%;
  display: none;
}

.card.flipped img,
.card.matched img {
  display: block;
}

.card.flipped,
.card.matched {
  background: #fff;
}

.card:hover {
  transform: scale(1.05);
}

/* ===== MODAL ===== */
#winModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.modal-content button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 1rem;
  cursor: pointer;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  header h1 {
    font-size: 2rem;
  }
}
</style>
</head>

<body>

<!-- ===== MENÚ ===== -->
<div id="menu">
  <h1>Memorama Colgate-Palmolive</h1>

  <div class="difficulty">
    <button onclick="selectDifficulty('easy')">🟢 Fácil (4x4)</button>
    <button onclick="selectDifficulty('medium')">🟡 Medio (5x4)</button>
    <button onclick="selectDifficulty('hard')">🔴 Difícil (6x4)</button>
  </div>

  <button id="startBtn" onclick="startGame()">▶️ Comenzar</button>
</div>

<!-- ===== JUEGO ===== -->
<div id="game">
  <header>
    <h1>Memorama Colgate-Palmolive</h1>
    <div class="controls">
      <button onclick="toggleSound()">🔊 Sonido</button>
      <span>Intentos: <span id="moves">0</span></span>
      <button onclick="restart()">🔄 Reiniciar</button>
      <button onclick="backToMenu()">🏠 Menú</button>
    </div>
  </header>

  <div id="board"></div>
</div>

<!-- ===== MODAL ===== -->
<div id="winModal">
  <div class="modal-content">
    <h2>🎉 ¡Felicidades!</h2>
    <p>Completaste el memorama</p>
    <p>Intentos: <span id="finalMoves"></span></p>
    <button onclick="restart()">🔁 Jugar otra vez</button>
    <button onclick="backToMenu()">🏠 Menú</button>
  </div>
</div>

<!-- ===== SONIDOS ===== -->
<audio id="successSound" src="feria.wav"></audio>
<audio id="errorSound" src="error.wav"></audio>

<script>
/* ===== CONFIG ===== */
const images = [
  "img1.png","img2.png","img3.png","img4.png",
  "img5.png","img6.png","img7.png","img8.png"
];

let difficulty = null;
let pairs = 0;
let cols = 4;
let moves = 0;
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matchedPairs = 0;
let soundOn = true;

/* ===== DIFICULTAD ===== */
function selectDifficulty(level) {
  difficulty = level;

  if (level === "easy") {
    pairs = 8; cols = 4;
  } else if (level === "medium") {
    pairs = 10; cols = 5;
  } else {
    pairs = 12; cols = 6;
  }
}

/* ===== INICIAR ===== */
function startGame() {
  if (!difficulty) {
    alert("Selecciona una dificultad");
    return;
  }

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  initBoard();
}

/* ===== TABLERO ===== */
function initBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  moves = 0;
  matchedPairs = 0;
  document.getElementById("moves").textContent = moves;

  let selectedImages = images.slice(0, pairs);
  let cardImages = [...selectedImages, ...selectedImages];
  cardImages.sort(() => Math.random() - 0.5);

  cardImages.forEach(img => {
    const card = document.createElement("div");
    card.classList.add("card");
    card.style.height = difficulty === "easy" ? "180px" : "150px";

    const image = document.createElement("img");
    image.src = img;

    card.appendChild(image);
    card.addEventListener("click", () => flipCard(card, img));

    board.appendChild(card);
  });
}

/* ===== JUEGO ===== */
function flipCard(card, img) {
  if (lockBoard || card.classList.contains("flipped")) return;

  card.classList.add("flipped");

  if (!firstCard) {
    firstCard = { card, img };
    return;
  }

  secondCard = { card, img };
  moves++;
  document.getElementById("moves").textContent = moves;

  checkMatch();
}

function checkMatch() {
  if (firstCard.img === secondCard.img) {
    firstCard.card.classList.add("matched");
    secondCard.card.classList.add("matched");
    matchedPairs++;

    if (soundOn) document.getElementById("successSound").play();

    resetTurn();

    if (matchedPairs === pairs) {
      document.getElementById("finalMoves").textContent = moves;
      document.getElementById("winModal").style.display = "flex";
    }
  } else {
    lockBoard = true;
    if (soundOn) document.getElementById("errorSound").play();

    setTimeout(() => {
      firstCard.card.classList.remove("flipped");
      secondCard.card.classList.remove("flipped");
      resetTurn();
    }, 800);
  }
}

function resetTurn() {
  [firstCard, secondCard] = [null, null];
  lockBoard = false;
}

/* ===== CONTROLES ===== */
function toggleSound() {
  soundOn = !soundOn;
}

function restart() {
  document.getElementById("winModal").style.display = "none";
  initBoard();
}

function backToMenu() {
  document.getElementById("game").style.display = "none";
  document.getElementById("menu").style.display = "flex";
  document.getElementById("winModal").style.display = "none";
}
</script>

</body>
</html>
