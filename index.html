<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Memorama Colgate-Palmolive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  margin: 0;
  background: #f2f2f2;
  text-align: center;
}

header {
  background: #d32f2f;
  color: white;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.hidden { display: none; }

/* ===== MENU ===== */
#menu {
  margin-top: 60px;
}

.menu-btn {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.menu-btn:hover {
  background: #b71c1c;
}

/* ===== HUD ===== */
#hud {
  margin: 15px;
  font-size: 18px;
}

button {
  cursor: pointer;
}

/* ===== BOARD ===== */
#board {
  display: grid;
  gap: 15px;
  justify-content: center;
  margin: 30px auto;
  max-width: 600px;
}

.card {
  width: 120px;
  height: 160px;
  background: #d32f2f;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  position: relative;
}

.card img {
  width: 90%;
  height: auto;
  display: none;
}

.card.flipped {
  background: white;
}

.card.flipped img {
  display: block;
}

.card.matched {
  pointer-events: none;
  opacity: 0.6;
}

/* ===== MODAL ===== */
#winModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
}

.modal-content h2 {
  color: #d32f2f;
}

/* ===== CONFETTI ===== */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<!-- MENU -->
<div id="menu">
  <h2>Selecciona dificultad</h2>
  <button class="menu-btn" onclick="startGame('easy')">Fácil</button>
  <button class="menu-btn" onclick="startGame('medium')">Normal</button>
  <button class="menu-btn" onclick="startGame('hard')">Difícil</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="hud">
    <button onclick="resetGame()">🔄 Reiniciar</button>
    <button onclick="backToMenu()">🏠 Menú</button>
    &nbsp;&nbsp; Intentos: <span id="moves">0</span>
  </div>
  <div id="board"></div>
</div>

<!-- WIN MODAL -->
<div id="winModal" class="hidden">
  <div class="modal-content">
    <h2>¡Felicidades!</h2>
    <p>Lo lograste en <strong><span id="finalMoves"></span></strong> intentos</p>
    <button class="menu-btn" onclick="resetGame()">Jugar otra vez</button>
  </div>
</div>

<script>
const difficulties = {
  easy: { rows: 2, cols: 2, pairs: 2 },
  medium: { rows: 2, cols: 3, pairs: 3 },
  hard: { rows: 4, cols: 4, pairs: 8 }
};

let firstCard = null;
let secondCard = null;
let lock = false;
let moves = 0;
let matches = 0;
let confettiInterval = null;
let currentDifficulty = null;

const board = document.getElementById("board");
const movesEl = document.getElementById("moves");

function startGame(level) {
  currentDifficulty = level;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  initBoard();
}

function initBoard() {
  stopConfetti();
  board.innerHTML = "";
  moves = 0;
  matches = 0;
  movesEl.textContent = moves;

  const { rows, cols, pairs } = difficulties[currentDifficulty];

  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  let images = [];
  for (let i = 1; i <= pairs; i++) {
    images.push(`img${i}.png`, `img${i}.png`);
  }

  images.sort(() => Math.random() - 0.5);

  images.forEach(src => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<span>Colgate</span><img src="${src}" />`;
    card.onclick = () => flipCard(card);
    board.appendChild(card);
  });
}

function flipCard(card) {
  if (lock || card.classList.contains("flipped")) return;

  card.classList.add("flipped");

  if (!firstCard) {
    firstCard = card;
    return;
  }

  secondCard = card;
  lock = true;
  moves++;
  movesEl.textContent = moves;

  const img1 = firstCard.querySelector("img").src;
  const img2 = secondCard.querySelector("img").src;

  if (img1 === img2) {
    firstCard.classList.add("matched");
    secondCard.classList.add("matched");
    matches++;
    resetTurn();

    if (matches === difficulties[currentDifficulty].pairs) {
      winGame();
    }
  } else {
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      resetTurn();
    }, 800);
  }
}

function resetTurn() {
  firstCard = null;
  secondCard = null;
  lock = false;
}

function winGame() {
  document.getElementById("finalMoves").textContent = moves;
  document.getElementById("winModal").classList.remove("hidden");
  startConfetti();
}

function resetGame() {
  document.getElementById("winModal").classList.add("hidden");
  initBoard();
}

function backToMenu() {
  stopConfetti();
  document.getElementById("game").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

/* ===== CONFETTI CONTROL ===== */
function startConfetti() {
  stopConfetti();
  confettiInterval = setInterval(() => {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = Math.random() > 0.5 ? "#ffffff" : "#d32f2f";
    c.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }, 200);
}

function stopConfetti() {
  clearInterval(confettiInterval);
  confettiInterval = null;
  document.querySelectorAll(".confetti").forEach(c => c.remove());
}
</script>

</body>
</html>
