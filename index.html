<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Memorama Colgate-Palmolive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f2f2f2;
      text-align: center;
    }

    header {
      background: #7a0f0f;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    #controls {
      margin: 20px;
    }

    button {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 5px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #b71c1c;
    }

    #attempts {
      margin: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    #game {
      display: grid;
      justify-content: center;
      gap: 15px;
      margin: 20px auto;
      max-width: 600px;
    }

    /* CARTA */
    .card {
      width: 120px;
      height: 120px;
      background: #d32f2f;
      border-radius: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* 🔒 evita que la imagen se salga */
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* ✅ AJUSTE 2: la imagen siempre cabe */
      display: none;
      pointer-events: none;
    }

    .card.flipped img {
      display: block;
    }

    .card.flipped {
      background: white;
    }

    /* MODAL */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #modalContent {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 300px;
    }

    #modalContent h2 {
      color: #d32f2f;
    }
  </style>
</head>

<body>

  <header>Memorama Colgate-Palmolive</header>

  <div id="controls">
    <button onclick="startGame(6)">Fácil</button>
    <button onclick="startGame(12)">Medio</button>
    <button onclick="startGame(16)">Difícil</button>
  </div>

  <div id="attempts">Intentos: 0</div>

  <div id="game"></div>

  <!-- MODAL -->
  <div id="modal">
    <div id="modalContent">
      <h2>¡Felicidades!</h2>
      <p id="resultText"></p>
      <button onclick="restart()">Jugar otra vez</button>
    </div>
  </div>

  <audio id="successSound" src="feria.wav"></audio>
  <audio id="errorSound" src="error.wav"></audio>

  <script>
    const images = [
      "img/img1.png",
      "img/img2.png",
      "img/img3.png",
      "img/img4.png",
      "img/img5.png",
      "img/img6.png",
      "img/img7.png",
      "img/img8.png"
    ];

    let firstCard = null;
    let secondCard = null;
    let lock = false;
    let attempts = 0;
    let matches = 0;
    let totalPairs = 0;

    function startGame(cardCount) {
      const game = document.getElementById("game");
      game.innerHTML = "";
      attempts = 0;
      matches = 0;
      firstCard = null;
      secondCard = null;
      lock = false;

      document.getElementById("attempts").textContent = "Intentos: 0";

      document.getElementById("modal").style.display = "none";

      totalPairs = cardCount / 2;

      let selected = images.slice(0, totalPairs);
      let cards = [...selected, ...selected].sort(() => 0.5 - Math.random());

      game.style.gridTemplateColumns = `repeat(${Math.sqrt(cardCount)}, 120px)`;

      cards.forEach(img => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.image = img;

        const image = document.createElement("img");
        image.src = img;

        card.appendChild(image);
        card.addEventListener("click", () => flipCard(card));

        game.appendChild(card);
      });
    }

    function flipCard(card) {
      if (lock || card.classList.contains("flipped")) return;

      card.classList.add("flipped");

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      lock = true;
      attempts++;
      document.getElementById("attempts").textContent = `Intentos: ${attempts}`;

      if (firstCard.dataset.image === secondCard.dataset.image) {
        matches++;
        document.getElementById("successSound").play();
        resetTurn();

        if (matches === totalPairs) {
          setTimeout(showWin, 600);
        }
      } else {
        document.getElementById("errorSound").play();
        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetTurn();
        }, 900);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lock = false;
    }

    function showWin() {
      document.getElementById("resultText").textContent =
        `Lo lograste en ${attempts} intentos`;
      document.getElementById("modal").style.display = "flex";
    }

    function restart() {
      document.getElementById("modal").style.display = "none";
      document.getElementById("game").innerHTML = "";
    }
  </script>

</body>
</html>
