<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Memorama Colgate-Palmolive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    header {
      background: #8B1E1E;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .controls {
      margin: 20px 0;
    }

    button {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 5px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .stats {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .game {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      gap: 15px;
      justify-content: center;
    }

    .card {
      width: 120px;
      height: 160px;
      background: #d32f2f;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .card img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      display: none;
    }

    .card.flipped {
      background: white;
    }

    .card.flipped img {
      display: block;
    }
  </style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<div class="controls">
  <button id="soundBtn">🔊 Activar sonido</button>
</div>

<div class="controls">
  <button onclick="startGame()">Fácil</button>
  <button onclick="startGame()">Medio</button>
  <button onclick="startGame()">Difícil</button>
</div>

<div class="stats">
  Intentos: <span id="moves">0</span>
</div>

<div class="game" id="gameBoard"></div>

<!-- AUDIOS -->
<audio id="bgMusic" src="audio/ambient.mp3" loop></audio>
<audio id="flipSound" src="audio/flip.mp3"></audio>
<audio id="matchSound" src="audio/match.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<script>
  const images = [
    'img/accion.png',
    'img/colgate.png',
    'img/palmolive.png'
  ];

  let cards = [];
  let flipped = [];
  let moves = 0;
  let soundEnabled = false;

  const board = document.getElementById('gameBoard');
  const movesEl = document.getElementById('moves');
  const bgMusic = document.getElementById('bgMusic');
  const flipSound = document.getElementById('flipSound');
  const matchSound = document.getElementById('matchSound');
  const winSound = document.getElementById('winSound');
  const soundBtn = document.getElementById('soundBtn');

  soundBtn.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    if (soundEnabled) {
      bgMusic.volume = 0.4;
      bgMusic.play();
      soundBtn.textContent = '🔇 Silenciar sonido';
    } else {
      bgMusic.pause();
      soundBtn.textContent = '🔊 Activar sonido';
    }
  });

  function startGame() {
    board.innerHTML = '';
    moves = 0;
    movesEl.textContent = moves;
    flipped = [];

    cards = [...images, ...images].sort(() => Math.random() - 0.5);

    cards.forEach(img => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.image = img;

      const image = document.createElement('img');
      image.src = img;

      card.appendChild(image);
      card.addEventListener('click', () => flipCard(card));

      board.appendChild(card);
    });
  }

  function flipCard(card) {
    if (card.classList.contains('flipped') || flipped.length === 2) return;

    card.classList.add('flipped');
    if (soundEnabled) {
      flipSound.currentTime = 0;
      flipSound.play();
    }

    flipped.push(card);

    if (flipped.length === 2) {
      moves++;
      movesEl.textContent = moves;

      if (flipped[0].dataset.image === flipped[1].dataset.image) {
        if (soundEnabled) {
          matchSound.currentTime = 0;
          matchSound.play();
        }
        flipped = [];

        if (document.querySelectorAll('.card.flipped').length === cards.length) {
          if (soundEnabled) {
            winSound.play();
          }
          setTimeout(() => alert('🎉 ¡Ganaste!'), 300);
        }
      } else {
        setTimeout(() => {
          flipped.forEach(c => c.classList.remove('flipped'));
          flipped = [];
        }, 800);
      }
    }
  }

  startGame();
</script>

</body>
</html>
