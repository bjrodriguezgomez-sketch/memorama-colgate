<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Colgate-Palmolive Memory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CONFETTI -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      background: #8B1E1E;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: bold;
    }

    /* LOGO */
    .logo-floating {
      position: absolute;
      top: 5px;
      left: 40px;
      width: 400px;
      z-index: 9;
    }

    .logo-floating img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* MENU */
    .menu {
      margin-top: 160px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .menu.hidden {
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }

    button {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 12px 18px;
      margin: 8px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    }

    /* GAME UI */
    .game-ui {
      display: none;
      margin-top: 0;
    }

    /* ELEMENTOS FLOTANTES INDEPENDIENTES */
    .home-btn {
      position: fixed;
      top: 56px;
      right: 16px;
      z-index: 11;
    }

    .stats {
      position: fixed;
      top: 116px;
      right: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      z-index: 11;
    }

    .timer {
      position: fixed;
      top: 146px;
      right: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      z-index: 11;
    }

    /* BOARD */
    .game {
      display: grid;
      gap: 12px;
      max-width: 420px;
      margin: 0px auto 40px;
      padding: 0 10px;
    }

    /* CARD */
    .card {
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      aspect-ratio: 3 / 4;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease, box-shadow 0.2s ease;
      border-radius: 16px;
    }

    .card:hover .card-inner {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-front {
      background: #d32f2f;
    }

    .card-back {
      background: white;
      transform: rotateY(180deg);
      border: 3px solid #d32f2f;
    }

    .card-back img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    /* MATCH */
    .card.matched .card-inner {
      animation: matchPulse 0.6s ease;
      box-shadow: 0 0 18px rgba(211,47,47,0.8);
    }

    @keyframes matchPulse {
      0% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.08); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* WIN */
    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .win-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
    }

    .win-box h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<header>
  <h1>Colgate-Palmolive Memory</h1>
</header>

<div class="logo-floating">
  <img src="img/logo.png" alt="Colgate Logo">
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <button onclick="startGame(2,2)">Fácil 2x2</button>
  <button onclick="startGame(2,3)">Medio 2x3</button>
  <button onclick="startGame(4,4)">Difícil 4x4</button>
</div>

<!-- GAME -->
<div class="game-ui" id="gameUI">

  <button class="home-btn" onclick="goHome()">🏠 Home</button>
  <div class="stats">Intentos: <span id="moves">0</span></div>
  <div class="timer">Tiempo: <span id="time">00:00</span></div>

  <div class="game" id="gameBoard"></div>
</div>

<!-- WIN -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2>🎉 ¡Felicidades!</h2>
    <button onclick="goHome()">Volver al menú</button>
  </div>
</div>

<!-- AUDIOS -->
<audio id="bgMusic" src="audio/ambient.mp3" loop></audio>
<audio id="flipSound" src="audio/flip.mp3"></audio>
<audio id="matchSound" src="audio/match.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<script>
  const images = Array.from({ length: 8 }, (_, i) => `img/img${i+1}.png`);

  let cards = [];
  let flipped = [];
  let moves = 0;
  let time = 0;
  let timerInterval = null;

  const board = document.getElementById('gameBoard');
  const movesEl = document.getElementById('moves');
  const timeEl = document.getElementById('time');
  const menu = document.getElementById('menu');
  const gameUI = document.getElementById('gameUI');
  const winOverlay = document.getElementById('winOverlay');

  const bgMusic = document.getElementById('bgMusic');
  const flipSound = document.getElementById('flipSound');
  const matchSound = document.getElementById('matchSound');
  const winSound = document.getElementById('winSound');

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      time++;
      const m = String(Math.floor(time / 60)).padStart(2, '0');
      const s = String(time % 60).padStart(2, '0');
      timeEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }

  function startGame(rows, cols) {
    menu.classList.add('hidden');
    gameUI.style.display = 'block';
    board.innerHTML = '';
    moves = 0;
    movesEl.textContent = moves;
    flipped = [];

    time = 0;
    timeEl.textContent = '00:00';
    startTimer();

    bgMusic.currentTime = 0;
    bgMusic.volume = 0.4;
    bgMusic.play();

    const pairs = (rows * cols) / 2;
    const selected = images.slice(0, pairs);
    cards = [...selected, ...selected].sort(() => Math.random() - 0.5);

    board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    board.style.maxWidth = cols === 4 ? '460px' : '420px';

    cards.forEach(img => {
      const card = document.createElement('div');
      card.className = 'card';

      const inner = document.createElement('div');
      inner.className = 'card-inner';

      const front = document.createElement('div');
      front.className = 'card-face card-front';

      const back = document.createElement('div');
      back.className = 'card-face card-back';

      const image = document.createElement('img');
      image.src = img;

      back.appendChild(image);
      inner.append(front, back);
      card.appendChild(inner);

      card.addEventListener('click', () => flipCard(card, img));
      board.appendChild(card);
    });
  }

  function flipCard(card, img) {
    if (card.classList.contains('flipped') || flipped.length === 2) return;

    card.classList.add('flipped');
    flipSound.play();
    flipped.push({ card, img });

    if (flipped.length === 2) {
      moves++;
      movesEl.textContent = moves;

      if (flipped[0].img === flipped[1].img) {
        matchSound.play();
        flipped.forEach(c => c.card.classList.add('matched'));
        flipped = [];

        if (document.querySelectorAll('.card.flipped').length === cards.length) {
          stopTimer();
          bgMusic.pause();
          winSound.play();
          confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
          setTimeout(() => winOverlay.style.display = 'flex', 600);
        }
      } else {
        setTimeout(() => {
          flipped.forEach(c => c.card.classList.remove('flipped'));
          flipped = [];
        }, 900);
      }
    }
  }

  function goHome() {
    stopTimer();
    winOverlay.style.display = 'none';
    gameUI.style.display = 'none';
    menu.classList.remove('hidden');
    bgMusic.pause();
    bgMusic.currentTime = 0;
    winSound.pause();
    winSound.currentTime = 0;
  }
</script>

</body>
</html>
