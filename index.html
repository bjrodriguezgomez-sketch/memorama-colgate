<script>
/* =========================
   VARIABLES GLOBALES
========================= */
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let attempts = 0;
let matches = 0;
let totalPairs = 0;
let currentDifficulty = null;

/* =========================
   ELEMENTOS
========================= */
const menu = document.getElementById("menu");
const game = document.getElementById("game");
const board = document.getElementById("board");
const attemptsEl = document.getElementById("attempts");
const modal = document.getElementById("winModal");
const winText = document.getElementById("winText");

/* =========================
   CONFIGURACIÓN DIFICULTAD
========================= */
const difficulties = {
  easy: { cols: 2, pairs: 2 },
  normal: { cols: 3, pairs: 3 }, // 2x3
  hard: { cols: 4, pairs: 8 }    // 4x4
};

const images = [
  "img/img1.png",
  "img/img2.png",
  "img/img3.png",
  "img/img4.png",
  "img/img5.png",
  "img/img6.png",
  "img/img7.png",
  "img/img8.png"
];

/* =========================
   INICIAR JUEGO
========================= */
function startGame(level) {
  currentDifficulty = level;
  resetState();

  const config = difficulties[level];
  totalPairs = config.pairs;

  const selectedImages = images.slice(0, totalPairs);
  const cards = [...selectedImages, ...selectedImages]
    .sort(() => Math.random() - 0.5);

  board.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
  board.innerHTML = "";

  cards.forEach(src => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.image = src;

    card.innerHTML = `
      <div class="front">Colgate</div>
      <div class="back"><img src="${src}" /></div>
    `;

    card.addEventListener("click", () => flipCard(card));
    board.appendChild(card);
  });

  menu.style.display = "none";
  game.style.display = "block";
}

/* =========================
   VOLTEAR CARTA
========================= */
function flipCard(card) {
  if (lockBoard || card === firstCard || card.classList.contains("matched")) return;

  card.classList.add("flipped");

  if (!firstCard) {
    firstCard = card;
    return;
  }

  secondCard = card;
  lockBoard = true;
  attempts++;
  attemptsEl.textContent = attempts;

  checkMatch();
}

/* =========================
   COMPARAR
========================= */
function checkMatch() {
  const isMatch = firstCard.dataset.image === secondCard.dataset.image;

  if (isMatch) {
    firstCard.classList.add("matched");
    secondCard.classList.add("matched");
    matches++;

    resetTurn();

    if (matches === totalPairs) {
      setTimeout(showWin, 600);
    }
  } else {
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      resetTurn();
    }, 800);
  }
}

/* =========================
   RESET TURNO
========================= */
function resetTurn() {
  [firstCard, secondCard] = [null, null];
  lockBoard = false;
}

/* =========================
   GANAR
========================= */
function showWin() {
  winText.textContent = `Lo lograste en ${attempts} intentos`;
  modal.style.display = "flex";
}

/* =========================
   JUGAR OTRA VEZ
========================= */
function playAgain() {
  modal.style.display = "none";
  game.style.display = "none";
  menu.style.display = "block";
  resetState();
}

/* =========================
   RESET GENERAL
========================= */
function resetState() {
  board.innerHTML = "";
  attempts = 0;
  matches = 0;
  firstCard = null;
  secondCard = null;
  lockBoard = false;
  attemptsEl.textContent = "0";
}

/* =========================
   BOTONES
========================= */
document.getElementById("easyBtn").onclick = () => startGame("easy");
document.getElementById("normalBtn").onclick = () => startGame("normal");
document.getElementById("hardBtn").onclick = () => startGame("hard");
document.getElementById("playAgainBtn").onclick = playAgain;
</script>
