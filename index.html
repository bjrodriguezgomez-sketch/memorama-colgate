<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memorama Colgate-Palmolive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
}

header {
  background: #8b0000;
  color: white;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

.controls button, .audio-btn {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 12px 22px;
  margin: 6px;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

.controls button:hover, .audio-btn:hover {
  background: #b71c1c;
}

#audioPanel {
  margin: 15px;
}

#attempts {
  font-size: 18px;
  font-weight: bold;
  margin: 10px;
}

.game {
  display: grid;
  gap: 15px;
  justify-content: center;
  padding-bottom: 40px;
}

.card {
  width: 120px;
  height: 160px;
  background: #d32f2f;
  border-radius: 16px;
  cursor: pointer;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
  background: white;
}

.card.flipped img {
  display: block;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
}

.modal-content h2 {
  color: #d32f2f;
}

.modal-content button {
  margin-top: 20px;
  background: #d32f2f;
  color: white;
  border: none;
  padding: 12px 22px;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<div id="audioPanel">
  <button class="audio-btn" onclick="enableAudio()">🔊 Activar sonido</button>
</div>

<div class="controls">
  <button onclick="startGame(4)">Fácil</button>
  <button onclick="startGame(6)">Medio</button>
  <button onclick="startGame(8)">Difícil</button>
</div>

<div id="attempts">Intentos: 0</div>
<div id="game" class="game"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>¡Felicidades!</h2>
    <p id="finalText"></p>
    <button onclick="resetGame()">Jugar otra vez</button>
  </div>
</div>

<script>
/* ========= AUDIO ========= */
let audioUnlocked = false;

const flipSound = new Audio("error.wav");
const matchSound = new Audio("feria.wav");
const winSound = new Audio("feria.wav");
const ambientSound = new Audio("feria.wav");

ambientSound.loop = true;
ambientSound.volume = 0.25;

function enableAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;

  flipSound.play().then(() => {
    flipSound.pause();
    flipSound.currentTime = 0;
  });

  ambientSound.play();
  document.getElementById("audioPanel").style.display = "none";
}

/* ========= JUEGO ========= */
const images = [
  "img/img1.png","img/img2.png","img/img3.png","img/img4.png",
  "img/img5.png","img/img6.png","img/img7.png","img/img8.png"
];

let first = null;
let second = null;
let lock = false;
let attempts = 0;
let matches = 0;
let totalPairs = 0;

function startGame(pairs) {
  if (!audioUnlocked) return alert("Activa el sonido primero 🔊");

  document.getElementById("modal").style.display = "none";
  document.getElementById("game").innerHTML = "";

  attempts = 0;
  matches = 0;
  first = null;
  second = null;
  lock = false;
  totalPairs = pairs;

  document.getElementById("attempts").textContent = "Intentos: 0";

  let cards = images.slice(0, pairs);
  cards = [...cards, ...cards].sort(() => 0.5 - Math.random());

  const game = document.getElementById("game");
  game.style.gridTemplateColumns =
    pairs === 4 ? "repeat(2,120px)" :
    pairs === 6 ? "repeat(3,120px)" :
    "repeat(4,120px)";

  cards.forEach(src => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.img = src;

    const img = document.createElement("img");
    img.src = src;

    card.appendChild(img);
    card.onclick = () => flip(card);
    game.appendChild(card);
  });
}

function flip(card) {
  if (lock || card.classList.contains("flipped")) return;

  flipSound.currentTime = 0;
  flipSound.play();

  card.classList.add("flipped");

  if (!first) first = card;
  else {
    second = card;
    attempts++;
    document.getElementById("attempts").textContent = "Intentos: " + attempts;
    check();
  }
}

function check() {
  lock = true;
  if (first.dataset.img === second.dataset.img) {
    matchSound.currentTime = 0;
    matchSound.play();
    matches++;
    resetSel();
    if (matches === totalPairs) setTimeout(win, 600);
  } else {
    setTimeout(() => {
      first.classList.remove("flipped");
      second.classList.remove("flipped");
      resetSel();
    }, 800);
  }
}

function resetSel() {
  first = null;
  second = null;
  lock = false;
}

function win() {
  ambientSound.pause();
  winSound.play();

  document.getElementById("finalText").textContent =
    `Lo lograste en ${attempts} intentos`;
  document.getElementById("modal").style.display = "flex";
}

function resetGame() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("game").innerHTML = "";
  document.getElementById("attempts").textContent = "Intentos: 0";
  ambientSound.play();
}
</script>

</body>
</html>
