<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colgate-Palmolive Memory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 48px;
  background: #8B1E1E;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

header h1 {
  font-size: 18px;
  margin: 0;
}

/* LOGO */
.logo-floating {
  position: absolute;
  top: 32px;
  left: 40px;
  width: 200px;
  z-index: 9;
}

.logo-floating img {
  width: 100%;
}

/* MENU */
#menu {
  margin-top: 160px;
  text-align: center;
}

button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 12px 18px;
  margin: 6px;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
}

/* GAME UI */
#gameUI {
  display: none;
  margin-top: 120px;
  position: relative;
}

/* SIDE PANEL */
#sidePanel {
  position: absolute;
  top: 0;
  right: 40px;
  text-align: right;
}

.stats {
  font-size: 18px;
  margin-top: 8px;
}

/* BOARD */
.game {
  display: grid;
  gap: 14px;
  justify-content: center;
}

/* CARD */
.card {
  width: 120px;
  height: 160px;
  background: #d32f2f;
  border-radius: 16px;
  cursor: pointer;
  perspective: 800px;
  box-shadow: 0 4px 8px rgba(0,0,0,.25);
  transition: transform .2s, box-shadow .2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 18px rgba(0,0,0,.3);
}

.card-inner {
  width: 100%;
  height: 100%;
  transition: transform .6s;
  transform-style: preserve-3d;
  position: relative;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front {
  background: #d32f2f;
}

.card-back {
  background: white;
  transform: rotateY(180deg);
  border: 3px solid #d32f2f;
}

.card-back img {
  width: 85%;
  height: 85%;
  object-fit: contain;
}

/* WIN MODAL */
#winModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 30;
  align-items: center;
  justify-content: center;
}

#winBox {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 300px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h1>Colgate-Palmolive Memory</h1>
</header>

<div class="logo-floating">
  <img src="img/logo.png">
</div>

<div id="menu">
  <button onclick="startGame(2,2)">Fácil 2x2</button>
  <button onclick="startGame(3,2)">Medio 2x3</button>
  <button onclick="startGame(4,4)">Difícil 4x4</button>
</div>

<div id="gameUI">
  <div class="game" id="board"></div>

  <div id="sidePanel">
    <button onclick="goHome()">🏠 Home</button>
    <div class="stats">Intentos: <span id="moves">0</span></div>
  </div>
</div>

<div id="winModal">
  <div id="winBox">
    <h2>🎉 ¡Felicidades!</h2>
    <p>Completaste el nivel</p>
    <button onclick="goHome()">Volver al menú</button>
  </div>
</div>

<script>
const images = [
  'img/img1.png','img/img2.png','img/img3.png','img/img4.png',
  'img/img5.png','img/img6.png','img/img7.png','img/img8.png'
];

let flipped = [];
let moves = 0;
let matches = 0;
let totalPairs = 0;

const board = document.getElementById('board');
const movesEl = document.getElementById('moves');

function startGame(cols, rows) {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('gameUI').style.display = 'block';
  document.getElementById('winModal').style.display = 'none';

  board.innerHTML = '';
  flipped = [];
  moves = 0;
  matches = 0;
  movesEl.textContent = 0;

  totalPairs = (cols * rows) / 2;
  const selected = images.slice(0, totalPairs);
  const cards = [...selected, ...selected].sort(() => Math.random() - 0.5);

  board.style.gridTemplateColumns = `repeat(${cols}, 120px)`;

  cards.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front"></div>
        <div class="card-face card-back">
          <img src="${src}">
        </div>
      </div>`;
    card.onclick = () => flip(card, src);
    board.appendChild(card);
  });
}

function flip(card, src) {
  if (card.classList.contains('flipped') || flipped.length === 2) return;

  card.classList.add('flipped');
  flipped.push({ card, src });

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;

    if (flipped[0].src === flipped[1].src) {
      matches++;
      flipped = [];

      if (matches === totalPairs) {
        document.getElementById('winModal').style.display = 'flex';
      }
    } else {
      setTimeout(() => {
        flipped.forEach(f => f.card.classList.remove('flipped'));
        flipped = [];
      }, 800);
    }
  }
}

function goHome() {
  document.getElementById('gameUI').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
  document.getElementById('winModal').style.display = 'none';
}
</script>

</body>
</html>
