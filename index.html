<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memorama Colgate-Palmolive</title>

<style>
:root {
  --red: #d32f2f;
  --white: #ffffff;
}

* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: #f2f2f2;
  overflow: hidden;
}

/* HEADER */
header {
  background: var(--red);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* MENU */
#menu {
  height: calc(100vh - 80px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.menu-buttons button {
  background: var(--red);
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

/* GAME UI */
#game {
  display: none;
  height: calc(100vh - 80px);
  padding: 20px;
}

.top-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 15px;
  font-size: 18px;
}

.top-bar button {
  background: var(--red);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
}

/* BOARD */
#board {
  display: grid;
  gap: 15px;
  justify-content: center;
}

/* CARD */
.card {
  width: 110px;
  height: 150px;
  border-radius: 12px;
  cursor: pointer;
  perspective: 1000px;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  backface-visibility: hidden;
}

.card-back {
  background: var(--red);
  color: white;
  font-weight: bold;
  font-size: 18px;
}

.card-front {
  background: white;
  transform: rotateY(180deg);
}

.card-front img {
  max-width: 80%;
  max-height: 80%;
}

/* MODAL */
#winModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#winModal.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
}

.modal-content h2 {
  color: var(--red);
}

.modal-content button {
  margin-top: 15px;
  background: var(--red);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 12px;
  top: -20px;
  animation: fall linear forwards;
  z-index: 9;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<header>Memorama Colgate-Palmolive</header>

<!-- MENU -->
<div id="menu">
  <h2>Selecciona dificultad</h2>
  <div class="menu-buttons">
    <button onclick="startGame('easy')">Fácil</button>
    <button onclick="startGame('normal')">Normal</button>
    <button onclick="startGame('hard')">Difícil</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="top-bar">
    <span>Intentos: <b id="moves">0</b></span>
    <button onclick="resetGame()">Reiniciar</button>
    <button onclick="backToMenu()">Menú</button>
  </div>
  <div id="board"></div>
</div>

<!-- WIN MODAL -->
<div id="winModal" class="hidden">
  <div class="modal-content">
    <h2>¡Felicidades!</h2>
    <p>Lo lograste en <b id="finalMoves"></b> intentos</p>
    <button onclick="resetGame()">Jugar otra vez</button>
  </div>
</div>

<script>
const images = [
  "img1.png","img2.png","img3.png","img4.png",
  "img5.png","img6.png","img7.png","img8.png"
];

let first = null;
let lock = false;
let moves = 0;
let pairs = 0;
let totalPairs = 0;
let confettiInterval = null;

function startGame(level) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  let rows, cols;
  if (level === "easy") [rows, cols] = [2, 2];
  if (level === "normal") [rows, cols] = [2, 3];
  if (level === "hard") [rows, cols] = [4, 4];

  const board = document.getElementById("board");
  board.style.gridTemplateColumns = `repeat(${cols}, 110px)`;
  board.innerHTML = "";

  moves = 0;
  pairs = 0;
  document.getElementById("moves").textContent = moves;

  const needed = (rows * cols) / 2;
  totalPairs = needed;

  let selected = images.slice(0, needed);
  let cards = [...selected, ...selected].sort(() => Math.random() - 0.5);

  cards.forEach(img => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-back">Colgate</div>
        <div class="card-front"><img src="${img}" /></div>
      </div>`;
    card.onclick = () => flip(card, img);
    board.appendChild(card);
  });
}

function flip(card, img) {
  if (lock || card.classList.contains("flipped")) return;
  card.classList.add("flipped");

  if (!first) {
    first = { card, img };
    return;
  }

  moves++;
  document.getElementById("moves").textContent = moves;

  if (first.img === img) {
    pairs++;
    first = null;
    if (pairs === totalPairs) win();
  } else {
    lock = true;
    setTimeout(() => {
      card.classList.remove("flipped");
      first.card.classList.remove("flipped");
      first = null;
      lock = false;
    }, 800);
  }
}

function win() {
  document.getElementById("finalMoves").textContent = moves;
  document.getElementById("winModal").classList.remove("hidden");
  startConfetti();
}

function resetGame() {
  stopConfetti();
  document.getElementById("winModal").classList.add("hidden");
  document.getElementById("game").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

function backToMenu() {
  resetGame();
}

/* CONFETTI */
function startConfetti() {
  confettiInterval = setInterval(() => {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = Math.random() > 0.5 ? "#d32f2f" : "#ffffff";
    c.style.animationDuration = 3 + Math.random() * 2 + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }, 150);
}

function stopConfetti() {
  clearInterval(confettiInterval);
  document.querySelectorAll(".confetti").forEach(c => c.remove());
}

/* SEGURIDAD AL CARGAR */
window.onload = () => {
  stopConfetti();
  document.getElementById("winModal").classList.add("hidden");
};
</script>

</body>
</html>
