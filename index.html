<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colgate-Palmolive Memory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* ===== RESET ===== */
* { box-sizing: border-box; }

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

/* ===== HEADER ===== */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 48px;
  background: #8B1E1E;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

header h1 {
  font-size: 18px;
  margin: 0;
  font-weight: bold;
}

/* ===== LOGO ===== */
.logo-floating {
  position: absolute;
  top: 32px;
  left: 40px;
  width: 200px;
  z-index: 9;
}

.logo-floating img {
  width: 100%;
}

/* ===== BUTTONS ===== */
button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 12px 18px;
  margin: 6px;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

/* ===== MENU ===== */
#menu {
  margin-top: 140px;
}

/* ===== GAME UI ===== */
#gameUI {
  display: none;
  margin-top: 140px;
}

.stats {
  font-size: 18px;
  margin-bottom: 6px;
}

#timer {
  font-size: 16px;
  margin-bottom: 12px;
}

/* ===== BOARD ===== */
.game {
  display: grid;
  gap: 12px;
  max-width: 360px;
  margin: 0 auto 40px;
  padding: 0 10px;
}

/* ===== CARD ===== */
.card {
  aspect-ratio: 3 / 4;
  background: #d32f2f;
  border-radius: 16px;
  cursor: pointer;
  perspective: 800px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.25);
  transition: transform .2s, box-shadow .2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 18px rgba(0,0,0,0.3);
}

.card-inner {
  width: 100%;
  height: 100%;
  transition: transform .6s;
  transform-style: preserve-3d;
  position: relative;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front {
  background: #d32f2f;
}

.card-back {
  background: white;
  transform: rotateY(180deg);
  border: 3px solid #d32f2f;
}

.card-back img {
  width: 85%;
  height: 85%;
  object-fit: contain;
}

/* ===== MATCH ANIMATION ===== */
.card.matched {
  animation: matchPop .4s ease;
}

@keyframes matchPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); box-shadow: 0 0 20px red; }
  100% { transform: scale(1); }
}

/* ===== MODAL ===== */
#winModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 20;
  align-items: center;
  justify-content: center;
}

#winBox {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 320px;
}

input {
  padding: 8px;
  width: 100%;
  margin-top: 10px;
  font-size: 16px;
}

/* ===== RANKING ===== */
#ranking {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <h1>Colgate-Palmolive Memory</h1>
</header>

<div class="logo-floating">
  <img src="img/logo.png">
</div>

<!-- MENU -->
<div id="menu">
  <button onclick="startGame(4)">Fácil</button>
  <button onclick="startGame(6)">Medio</button>
  <button onclick="startGame(8)">Difícil</button>
</div>

<!-- GAME UI -->
<div id="gameUI">
  <button onclick="goHome()">🏠 Home</button>

  <div class="stats">Intentos: <span id="moves">0</span></div>
  <div id="timer">Tiempo: 00:00</div>

  <div class="game" id="board"></div>
</div>

<!-- MODAL -->
<div id="winModal">
  <div id="winBox">
    <h3>🎉 ¡Felicidades!</h3>
    <p>Puntuación: <strong id="scoreText"></strong></p>

    <input id="playerName" maxlength="10" placeholder="Tu nombre">
    <button onclick="saveScore()">Guardar</button>

    <div id="ranking"></div>

    <button onclick="goHome()">Volver al menú</button>
  </div>
</div>

<!-- AUDIOS -->
<audio id="bgMusic" src="audio/ambient.mp3" loop></audio>
<audio id="flipSound" src="audio/flip.mp3"></audio>
<audio id="matchSound" src="audio/match.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<script>
const images = [
  'img/img1.png','img/img2.png','img/img3.png','img/img4.png',
  'img/img5.png','img/img6.png','img/img7.png','img/img8.png'
];

let flipped=[], moves=0, matches=0, totalPairs=0;
let seconds=0, timerInterval=null, gameStarted=false;
let score=0;

const board=document.getElementById('board');
const movesEl=document.getElementById('moves');
const timerEl=document.getElementById('timer');
const menu=document.getElementById('menu');
const gameUI=document.getElementById('gameUI');
const winModal=document.getElementById('winModal');

function startGame(pairs){
  menu.style.display='none';
  gameUI.style.display='block';

  board.innerHTML='';
  flipped=[]; moves=0; matches=0;
  seconds=0; gameStarted=false;
  movesEl.textContent=0;
  timerEl.textContent='Tiempo: 00:00';

  clearInterval(timerInterval);

  totalPairs=pairs;
  const selected=images.slice(0,pairs);
  const cards=[...selected,...selected].sort(()=>Math.random()-0.5);

  board.style.gridTemplateColumns=`repeat(${pairs===4?2:pairs===6?3:4},1fr)`;

  cards.forEach(src=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-inner">
        <div class="card-face card-front"></div>
        <div class="card-face card-back"><img src="${src}"></div>
      </div>`;
    card.onclick=()=>flip(card,src);
    board.appendChild(card);
  });
}

function startTimer(){
  timerInterval=setInterval(()=>{
    seconds++;
    const m=String(Math.floor(seconds/60)).padStart(2,'0');
    const s=String(seconds%60).padStart(2,'0');
    timerEl.textContent=`Tiempo: ${m}:${s}`;
  },1000);
}

function flip(card,src){
  if(card.classList.contains('flipped')||flipped.length===2)return;

  if(!gameStarted){
    gameStarted=true;
    startTimer();
    bgMusic.volume=0.4;
    bgMusic.play();
  }

  flipSound.play();
  card.classList.add('flipped');
  flipped.push({card,src});

  if(flipped.length===2){
    moves++;
    movesEl.textContent=moves;

    if(flipped[0].src===flipped[1].src){
      matchSound.play();
      flipped.forEach(f=>f.card.classList.add('matched'));
      matches++;
      flipped=[];
      if(matches===totalPairs) win();
    } else {
      setTimeout(()=>{
        flipped.forEach(f=>f.card.classList.remove('flipped'));
        flipped=[];
      },800);
    }
  }
}

function win(){
  clearInterval(timerInterval);
  bgMusic.pause();
  winSound.play();

  score=Math.max(1000-(seconds*5)-(moves*10),0);
  document.getElementById('scoreText').textContent=score;

  confetti({particleCount:300,spread:90,colors:['#fff','#d32f2f']});
  winModal.style.display='flex';
  loadRanking();
}

function saveScore(){
  const name=document.getElementById('playerName').value||'Anon';
  const data=JSON.parse(localStorage.getItem('ranking')||'[]');
  data.push({name,score});
  data.sort((a,b)=>b.score-a.score);
  localStorage.setItem('ranking',JSON.stringify(data.slice(0,5)));
  loadRanking();
}

function loadRanking(){
  const data=JSON.parse(localStorage.getItem('ranking')||'[]');
  document.getElementById('ranking').innerHTML=
    '<h4>🏆 Ranking</h4>'+
    data.map((r,i)=>`${i+1}. ${r.name} - ${r.score}`).join('<br>');
}

function goHome(){
  winModal.style.display='none';
  gameUI.style.display='none';
  menu.style.display='block';
  bgMusic.pause();
}
</script>

</body>
</html>
