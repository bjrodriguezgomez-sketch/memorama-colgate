<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colgate-Palmolive Memory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #8B1E1E;
  height: 100px;
  padding: 0 16px;
  display: flex;
  align-items: center;
}

header img.logo {
  height: 200px;
  max-height: 100px;
}

/* SECCIONES */
#menuScreen,
#gameScreen {
  display: none;
  height: calc(100vh - 100px);
}

#menuScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#gameScreen {
  display: flex;
  flex-direction: column;
}

/* CONTROLES */
.controls {
  margin: 10px 0;
}

button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 12px 18px;
  margin: 6px;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
}

/* TOP BAR GAME */
.gameTop {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
}

.stats {
  font-size: 18px;
}

/* TABLERO */
.game {
  display: grid;
  gap: 12px;
  max-width: 460px;
  margin: 0 auto;
  padding: 0 12px;
  flex: 1;
}

/* CARTAS */
.card {
  aspect-ratio: 3 / 4;
  perspective: 1000px;
  opacity: 0;
  transform: translateY(20px);
  animation: enter 0.4s ease forwards;
}

@keyframes enter {
  to { opacity: 1; transform: translateY(0); }
}

.card-inner {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  transition: transform 0.6s, box-shadow 0.3s;
  transform-style: preserve-3d;
  cursor: pointer;
  position: relative;
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}

.card-inner:active {
  transform: translateY(-4px);
  box-shadow: 0 12px 22px rgba(0,0,0,0.25);
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front {
  background: #d32f2f;
}

.card-back {
  background: white;
  transform: rotateY(180deg);
  border: 4px solid #d32f2f;
}

.card-back img {
  width: 90%;
  height: 90%;
  object-fit: contain;
}

/* VICTORIA */
#winScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#winBox {
  background: white;
  padding: 30px;
  border-radius: 20px;
}
</style>
</head>

<body>

<header>
  <img src="img/logo.png" class="logo" alt="Colgate">
</header>

<!-- MENÚ -->
<div id="menuScreen">
  <h2>Colgate-Palmolive Memory</h2>
  <div class="controls">
    <button onclick="startGame(2)">Fácil 2x2</button>
    <button onclick="startGame(3)">Medio 2x3</button>
    <button onclick="startGame(8)">Difícil 4x4</button>
  </div>
</div>

<!-- JUEGO -->
<div id="gameScreen">
  <div class="gameTop">
    <button onclick="goHome()">🏠 Home</button>
    <div class="stats">Intentos: <span id="moves">0</span></div>
  </div>
  <div class="game" id="gameBoard"></div>
</div>

<div id="winScreen">
  <div id="winBox">
    <h2>🎉 ¡Felicidades!</h2>
    <button onclick="goHome()">Volver al menú</button>
  </div>
</div>

<!-- AUDIOS -->
<audio id="bgMusic" src="audio/ambient.mp3" loop></audio>
<audio id="flipSound" src="audio/flip.mp3"></audio>
<audio id="matchSound" src="audio/match.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<script>
const allImages = [
  'img/img1.png','img/img2.png','img/img3.png','img/img4.png',
  'img/img5.png','img/img6.png','img/img7.png','img/img8.png'
];

let flipped = [];
let moves = 0;
let totalCards = 0;
let soundEnabled = true;

const menuScreen = document.getElementById('menuScreen');
const gameScreen = document.getElementById('gameScreen');
const board = document.getElementById('gameBoard');
const movesEl = document.getElementById('moves');
const winScreen = document.getElementById('winScreen');

const bgMusic = document.getElementById('bgMusic');
const flipSound = document.getElementById('flipSound');
const matchSound = document.getElementById('matchSound');
const winSound = document.getElementById('winSound');

menuScreen.style.display = 'flex';

function startGame(pairs) {
  menuScreen.style.display = 'none';
  gameScreen.style.display = 'flex';
  winScreen.style.display = 'none';

  board.innerHTML = '';
  flipped = [];
  moves = 0;
  movesEl.textContent = 0;

  bgMusic.currentTime = 0;
  bgMusic.volume = 0.4;
  bgMusic.play();

  const selected = allImages.slice(0, pairs);
  const cards = [...selected, ...selected].sort(() => Math.random() - 0.5);
  totalCards = cards.length;

  const cols = pairs === 2 ? 2 : pairs === 3 ? 3 : 4;
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  cards.forEach((img, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 60}ms`;
    card.dataset.image = img;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back"><img src="${img}"></div>
      </div>
    `;

    card.onclick = () => flipCard(card);
    board.appendChild(card);
  });
}

function flipCard(card) {
  if (card.classList.contains('flipped') || flipped.length === 2) return;

  card.classList.add('flipped');
  flipSound.play();
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;

    if (flipped[0].dataset.image === flipped[1].dataset.image) {
      matchSound.play();
      flipped = [];

      if (document.querySelectorAll('.card.flipped').length === totalCards) {
        winGame();
      }
    } else {
      setTimeout(() => {
        flipped.forEach(c => c.classList.remove('flipped'));
        flipped = [];
      }, 800);
    }
  }
}

function winGame() {
  bgMusic.pause();
  winSound.play();
  winScreen.style.display = 'flex';

  const end = Date.now() + 1800;
  (function frame() {
    confetti({
      particleCount: 6,
      spread: 70,
      colors: ['#ffffff', '#d32f2f'],
      origin: { y: 0.6 }
    });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

function goHome() {
  board.innerHTML = '';
  flipped = [];
  moves = 0;
  movesEl.textContent = 0;
  bgMusic.pause();
  winSound.pause();
  winScreen.style.display = 'none';
  gameScreen.style.display = 'none';
  menuScreen.style.display = 'flex';
}
</script>

</body>
</html>
