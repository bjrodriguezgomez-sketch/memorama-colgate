<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colgate-Palmolive Memory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #8B1E1E;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}

header h1 {
  margin: 0;
  font-size: 18px;
  color: white;
  font-weight: bold;
}

/* LOGO */
.logo-floating {
  position: fixed;
  top: 100px;
  left: 16px;
  width: 400px;
  z-index: 999;
  pointer-events: none;
}

/* BUTTONS */
button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 14px 22px;
  margin: 8px;
  border-radius: 16px;
  font-size: 16px;
  cursor: pointer;
  transition: transform .2s ease, box-shadow .2s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 22px rgba(0,0,0,.35);
}

/* SCREENS */
.screen {
  position: absolute;
  inset: 48px 0 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hidden {
  display: none;
}

/* GAME LAYOUT */
.gameWrapper {
  width: 100%;
  height: 100%;
  position: relative;
}

/* HOME + STATS */
.sidePanel {
  position: absolute;
  right: 16px;
  top: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stats {
  margin-top: 8px;
  font-size: 18px;
}

/* BOARD */
.game {
  display: grid;
  gap: 14px;
  max-width: 460px;
  margin: 80px auto 0;
  padding: 0 14px;
}

/* CARDS */
.card {
  aspect-ratio: 3 / 4;
  perspective: 1000px;
}

.card-inner {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  transform-style: preserve-3d;
  transition: transform .35s ease, box-shadow .35s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,.25);
}

.card:hover .card-inner {
  transform: translateY(-6px);
  box-shadow: 0 18px 30px rgba(0,0,0,.35);
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card.match .card-inner {
  animation: matchPulse .6s ease;
  box-shadow: 0 0 28px rgba(211,47,47,1);
}

@keyframes matchPulse {
  0% { transform: rotateY(180deg) scale(1); }
  40% { transform: rotateY(180deg) scale(1.12); }
  100% { transform: rotateY(180deg) scale(1); }
}

.card-front,
.card-back {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front {
  background: #d32f2f;
}

.card-back {
  background: white;
  transform: rotateY(180deg);
  border: 4px solid #d32f2f;
}

.card-back img {
  width: 90%;
  height: 90%;
  object-fit: contain;
}

/* WIN */
#winScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#winBox {
  background: white;
  padding: 32px;
  border-radius: 20px;
  text-align: center;
}
</style>
</head>

<body>

<img src="img/logo.png" class="logo-floating" alt="Colgate Logo">

<header>
  <h1>Colgate-Palmolive Memory</h1>
</header>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <div>
    <button onclick="startGame(2)">Fácil 2x2</button>
    <button onclick="startGame(3)">Medio 2x3</button>
    <button onclick="startGame(8)">Difícil 4x4</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen hidden">
  <div class="gameWrapper">
    <div class="sidePanel">
      <button onclick="goHome()">🏠 Home</button>
      <div class="stats">Intentos: <span id="moves">0</span></div>
    </div>
    <div class="game" id="gameBoard"></div>
  </div>
</div>

<!-- WIN -->
<div id="winScreen">
  <div id="winBox">
    <h2>🎉 ¡Felicidades!</h2>
    <button onclick="goHome()">Volver al menú</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="audio/ambient.mp3" loop></audio>
<audio id="flipSound" src="audio/flip.mp3"></audio>
<audio id="matchSound" src="audio/match.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<script>
const images = [
  'img/img1.png','img/img2.png','img/img3.png','img/img4.png',
  'img/img5.png','img/img6.png','img/img7.png','img/img8.png'
];

let flipped = [];
let moves = 0;
let totalCards = 0;

const menu = document.getElementById('menuScreen');
const game = document.getElementById('gameScreen');
const board = document.getElementById('gameBoard');
const movesEl = document.getElementById('moves');
const winScreen = document.getElementById('winScreen');

const bgMusic = document.getElementById('bgMusic');
const flipSound = document.getElementById('flipSound');
const matchSound = document.getElementById('matchSound');
const winSound = document.getElementById('winSound');

function startGame(pairs) {
  menu.classList.add('hidden');
  game.classList.remove('hidden');

  board.innerHTML = '';
  flipped = [];
  moves = 0;
  movesEl.textContent = 0;

  bgMusic.currentTime = 0;
  bgMusic.volume = 0.4;
  bgMusic.play();

  const selected = images.slice(0, pairs);
  const cards = [...selected, ...selected].sort(() => Math.random() - 0.5);
  totalCards = cards.length;

  board.style.gridTemplateColumns =
    `repeat(${pairs === 2 ? 2 : pairs === 3 ? 3 : 4}, 1fr)`;

  cards.forEach(img => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.image = img;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back"><img src="${img}"></div>
      </div>`;
    card.onclick = () => flipCard(card);
    board.appendChild(card);
  });
}

function flipCard(card) {
  if (card.classList.contains('flipped') || flipped.length === 2) return;

  card.classList.add('flipped');
  flipSound.currentTime = 0;
  flipSound.play();
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;

    if (flipped[0].dataset.image === flipped[1].dataset.image) {
      matchSound.currentTime = 0;
      matchSound.play();
      flipped.forEach(c => c.classList.add('match'));
      flipped = [];

      if (document.querySelectorAll('.card.flipped').length === totalCards) {
        setTimeout(winGame, 300);
      }
    } else {
      setTimeout(() => {
        flipped.forEach(c => c.classList.remove('flipped'));
        flipped = [];
      }, 900);
    }
  }
}

function winGame() {
  bgMusic.pause();
  winSound.currentTime = 0;
  winSound.play();
  winScreen.style.display = 'flex';
  confetti({ particleCount: 200, spread: 80 });
}

function goHome() {
  bgMusic.pause();
  winSound.pause();
  winScreen.style.display = 'none';
  game.classList.add('hidden');
  menu.classList.remove('hidden');
}
</script>

</body>
</html>
