<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Memorama Colgate-Palmolive</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: #f2f2f2;
  text-align: center;
}

/* ===== HEADER ===== */
header {
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
}

/* ===== MENU ===== */
#menu {
  margin-top: 40px;
}

.levels {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.level {
  padding: 20px 30px;
  border-radius: 12px;
  border: 3px solid #d32f2f;
  background: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

.level:hover,
.level.active {
  background: #d32f2f;
  color: white;
}

/* ===== GAME BOARD ===== */
#game {
  display: none;
  padding: 30px;
}

.board {
  display: grid;
  justify-content: center;
  gap: 18px;
}

/* ===== CARD ===== */
.card {
  width: 140px;
  height: 180px;
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card.flip .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  backface-visibility: hidden;
}

/* BACK */
.card-back {
  background: #d32f2f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.card-back span {
  color: white;
  font-weight: bold;
  margin-top: 10px;
}

/* FRONT */
.card-front {
  background: white;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front img {
  max-width: 90%;
  max-height: 90%;
}

/* ===== MODAL ===== */
#winModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.modal {
  background: white;
  padding: 40px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

/* ===== CONFETTI ===== */
canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9;
}
</style>
</head>

<body>

<header>
  <h1>Memorama Colgate-Palmolive</h1>
  <div class="controls">
    <button onclick="resetGame()">🔄 Reiniciar</button>
    <button onclick="showMenu()">🏠 Menú</button>
    <span>Intentos: <b id="tries">0</b></span>
  </div>
</header>

<!-- MENU -->
<div id="menu">
  <h2>Selecciona dificultad</h2>
  <div class="levels">
    <div class="level" onclick="startGame(2,2,this)">Fácil</div>
    <div class="level" onclick="startGame(3,4,this)">Medio</div>
    <div class="level" onclick="startGame(4,4,this)">Difícil</div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="board" id="board"></div>
</div>

<!-- MODAL -->
<div id="winModal">
  <div class="modal">
    <h2>🎉 ¡Felicidades!</h2>
    <p>Completaste el memorama</p>
    <p>Intentos: <b id="finalTries"></b></p>
    <button onclick="resetGame()">Jugar otra vez</button>
    <button onclick="showMenu()">Menú</button>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
const images = [
  'img/img1.png',
  'img/img3.png',
  'img/img4.png',
  'img/img5.png',
  'img/img6.png',
  'img/img7.png',
  'img/img8.png'
];

let first = null;
let lock = false;
let matches = 0;
let tries = 0;
let totalPairs = 0;

function showMenu() {
  document.getElementById('menu').style.display = 'block';
  document.getElementById('game').style.display = 'none';
  document.getElementById('winModal').style.display = 'none';
  document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
}

function resetGame() {
  document.getElementById('winModal').style.display = 'none';
  startGame(currentRows, currentCols);
}

let currentRows = 0;
let currentCols = 0;

function startGame(rows, cols, el) {
  currentRows = rows;
  currentCols = cols;

  document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
  if (el) el.classList.add('active');

  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';

  tries = 0;
  matches = 0;
  document.getElementById('tries').textContent = 0;

  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${cols}, 140px)`;

  const needed = (rows * cols) / 2;
  totalPairs = needed;

  const selected = images.slice(0, needed);
  const cards = [...selected, ...selected].sort(() => Math.random() - 0.5);

  cards.forEach(img => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <span>Colgate</span>
        </div>
        <div class="card-face card-front">
          <img src="${img}">
        </div>
      </div>
    `;
    card.onclick = () => flip(card, img);
    board.appendChild(card);
  });
}

function flip(card, img) {
  if (lock || card === first || card.classList.contains('flip')) return;
  card.classList.add('flip');

  if (!first) {
    first = { card, img };
    return;
  }

  tries++;
  document.getElementById('tries').textContent = tries;

  if (first.img === img) {
    matches++;
    first = null;
    if (matches === totalPairs) win();
  } else {
    lock = true;
    setTimeout(() => {
      card.classList.remove('flip');
      first.card.classList.remove('flip');
      first = null;
      lock = false;
    }, 900);
  }
}

function win() {
  document.getElementById('finalTries').textContent = tries;
  document.getElementById('winModal').style.display = 'flex';
  launchConfetti();
}

/* ===== CONFETTI ===== */
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = innerWidth;
  canvas.height = innerHeight;

  const pieces = Array.from({length: 200}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 6 + 4,
    dy: Math.random() * 3 + 2
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.fillStyle = '#d32f2f';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      p.y += p.dy;
      if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>

</body>
</html>
