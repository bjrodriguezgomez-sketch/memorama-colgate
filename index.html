<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorama Colgate-Palmolive</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  margin-top: 20px;
}

.controls {
  margin: 15px 0;
}

button {
  padding: 8px 14px;
  margin: 0 5px;
  font-size: 14px;
  cursor: pointer;
}

#game {
  display: grid;
  grid-template-columns: repeat(4, 90px);
  gap: 12px;
  justify-content: center;
  margin: 20px auto;
}

.card {
  width: 90px;
  height: 120px;
  perspective: 600px;
}

.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.4s;
  transform-style: preserve-3d;
  cursor: pointer;
}

.card.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
}

.front {
  background: #d32f2f;
}

.back {
  background: white;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.back img {
  max-width: 80%;
  max-height: 80%;
}
</style>
</head>

<body>

<h1>Memorama Colgate-Palmolive</h1>

<div class="controls">
  <button onclick="toggleSound()">🔊 Sonido</button>
  Intentos: <span id="attempts">0</span>
  <button onclick="initGame()">🔄 Reiniciar</button>
</div>

<div id="game"></div>

<audio id="bgSound" src="feria.wav" loop></audio>
<audio id="errorSound" src="error.wav"></audio>

<script>
const images = [
  "img1.png",
  "img2.png",
  "img3.png",
  "img4.png",
  "img5.png",
  "img6.png",
  "img7.png",
  "img8.png"
];

const game = document.getElementById("game");
const attemptsEl = document.getElementById("attempts");
const bgSound = document.getElementById("bgSound");
const errorSound = document.getElementById("errorSound");

let firstCard = null;
let lock = false;
let attempts = 0;
let soundOn = true;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function toggleSound() {
  soundOn = !soundOn;
  if (soundOn) bgSound.play();
  else bgSound.pause();
}

function initGame() {
  game.innerHTML = "";
  attempts = 0;
  attemptsEl.textContent = attempts;
  firstCard = null;
  lock = false;

  if (soundOn) {
    bgSound.currentTime = 0;
    bgSound.play();
  }

  const cards = shuffle([...images, ...images]);

  cards.forEach(src => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="inner">
        <div class="front"></div>
        <div class="back">
          <img src="${src}">
        </div>
      </div>
    `;

    card.addEventListener("click", () => flipCard(card));
    game.appendChild(card);
  });
}

function flipCard(card) {
  if (lock || card.classList.contains("flipped")) return;

  card.classList.add("flipped");

  if (!firstCard) {
    firstCard = card;
    return;
  }

  attempts++;
  attemptsEl.textContent = attempts;
  lock = true;

  const img1 = firstCard.querySelector("img").src;
  const img2 = card.querySelector("img").src;

  if (img1 === img2) {
    firstCard = null;
    lock = false;
  } else {
    if (soundOn) errorSound.play();
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      card.classList.remove("flipped");
      firstCard = null;
      lock = false;
    }, 900);
  }
}

initGame();
</script>

</body>
</html>
